<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifold - Versioni Surat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
      
        .wave-pattern {
            background-image: repeating-linear-gradient(45deg, #fdf2f8 0px, #fdf2f8 2px, transparent 2px, transparent 10px);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
        }
    </style>
</head>
<body class="bg-white text-gray-900">

    <div class="h-1  w-full"></div>
    
    <nav class="flex items-center justify-between px-6 py-4 ">
        <div class="flex items-center gap-10">
            <div class="text-3xl font-black tracking-tighter uppercase italic text-gray-950">
                M A N I F O L D
            </div>
            
            <ul class="hidden md:flex space-x-6 text-sm font-medium text-gray-700">
                <li><a class="hover:text-pink-600 transition">Services</a></li>
                <li><a class="hover:text-pink-600 transition">Portfolio</a></li>
                <li><a class="hover:text-pink-600 transition">Email Marketing Audit</a></li>
            </ul>
        </div>

        <a class="bg-pink-500 text-white px-5 py-2.5 rounded-sm text-xs font-bold uppercase tracking-wider hover:bg-pink-600 transition shadow-sm">
            Contact Us
        </a>
    </nav>

    <section class="relative min-h-[85vh] flex items-center px-6 md:px-16 overflow-hidden">
        
        <div class="absolute inset-0 wave-pattern opacity-60"></div>

        <div class="relative max-w-5xl z-10 py-20">
            <h1 class="text-5xl md:text-8xl font-black leading-none tracking-tighter text-gray-950 uppercase">
                <span class="text-pink-600">Boost</span> your email<br>
                marketing results!
            </h1>
            
            <p class="mt-8 text-xl md:text-2xl text-gray-600 max-w-2xl font-light">
                We help B2C brands grow their email-attributed revenue
            </p>

            <button class="mt-12 bg-pink-500 text-white px-10 py-4 rounded-sm text-sm font-bold uppercase tracking-widest hover:bg-pink-600 transition-all shadow-lg hover:shadow-pink-200 active:scale-95">
                Boost your results
            </button>
        </div>
    </section>

</body>
</html>
